<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário - Página 2</title>
</head>
<body>

    <h1>Página 2: Escolha do Carro</h1>

    <form>
        <p>
            <label>Escolha o modelo:</label><br>
            <input type="radio" name="modelo"> BYD Seal<br>
            <input type="radio" name="modelo"> BYD Han<br>
            <input type="radio" name="modelo"> BYD Song Plus
        </p>

        <p>
            <label>Itens adicionais:</label><br>
            <input type="checkbox"> Som Premium<br>
            <input type="checkbox"> Ar-condicionado Digital<br>
            <input type="checkbox"> Câmera 360°
        </p>

        <p>
            <label>Cor do carro:</label><br>
            <input type="color">
        </p>

        <p>
            <label>Intensidade da cor (brilho):</label><br>
            <input type="range" min="0" max="100">
        </p>

        <br>
        <a href="pagina1.html"><< Voltar para Página 1</a> | 
        <a href="pagina3.html">Avançar para a Página 3 >></a>
    </form>

</body>
</html>
