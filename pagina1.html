<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário - Página 1</title>
</head>
<body>

    <h1>Página 1: Dados Pessoais</h1>

    <form>
        <p>
            <label>Nome completo:</label><br>
            <input type="text" placeholder="Digite seu nome completo">
        </p>

        <p>
            <label>Email:</label><br>
            <input type="email" placeholder="seuemail@exemplo.com">
        </p>

        <p>
            <label>Telefone:</label><br>
            <input type="tel" placeholder="(11)91234-5678">
        </p>

        <p>
            <label>Crie uma senha:</label><br>
            <input type="password" placeholder="Digite sua senha">
        </p>

        <p>
            <label>Idade:</label><br>
            <input type="number" placeholder="Sua idade">
        </p>

        <p>
            <label>Estado de entrega:</label><br>
            <select>
                <option>--Selecione seu estado--</option>
                <option>São Paulo</option>
                <option>Rio de Janeiro</option>
                <option>Minas Gerais</option>
            </select>
        </p>

        <p>
            <label>Envie uma foto da sua CNH:</label><br>
            <input type="file">
        </p>

        <br>
        <a href="pagina2.html">Avançar para a Página 2 >></a>
    </form>

</body>
</html>
