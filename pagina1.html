<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário - Página 1</title>
</head>
<body>

    <h1>Página 1: Dados Pessoais</h1>

    <form>
        <fieldset>
            <legend>Informações do Usuário</legend>
    
            <p>
                <label for="nome">Nome completo:</label><br>
                <input type="text" id="nome" placeholder="Digite seu nome completo">
            </p>
    
            <p>
                <label for="email">Email:</label><br>
                <input type="email" id="email" placeholder="seuemail@exemplo.com">
            </p>
    
            <p>
                <label for="telefone">Telefone:</label><br>
                <input type="tel" id="telefone" placeholder="(11)91234-5678">
            </p>
    
            <p>
                <label for="senha">Crie uma senha:</label><br>
                <input type="password" id="senha" placeholder="Digite sua senha">
            </p>
    
            <p>
                <label for="idade">Idade:</label><br>
                <input type="number" id="idade" placeholder="Sua idade">
            </p>
    
            <p>
                <label for="estado">Estado:</label><br>
                <select id="estado">
                    <option>Selecione seu estado</option>
                    
                    <optgroup label="Norte">
                        <option>Acre</option>
                        <option>Amapá</option>
                        <option>Amazonas</option>
                        <option>Pará</option>
                        <option>Rondônia</option>
                        <option>Roraima</option>
                        <option>Tocantins</option>
                    </optgroup>
                    
                    <optgroup label="Nordeste">
                        <option>Alagoas</option>
                        <option>Bahia</option>
                        <option>Ceará</option>
                        <option>Maranhão</option>
                        <option>Paraíba</option>
                        <option>Pernambuco</option>
                        <option>Piauí</option>
                        <option>Rio Grande do Norte</option>
                        <option>Sergipe</option>
                    </optgroup>
                    
                    <optgroup label="Centro-Oeste">
                        <option>Distrito Federal</option>
                        <option>Goiás</option>
                        <option>Mato Grosso</option>
                        <option>Mato Grosso do Sul</option>
                    </optgroup>
                    
                    <optgroup label="Sudeste">
                        <option>Espírito Santo</option>
                        <option>Minas Gerais</option>
                        <option>Rio de Janeiro</option>
                        <option>São Paulo</option>
                    </optgroup>
                    
                    <optgroup label="Sul">
                        <option>Paraná</option>
                        <option>Santa Catarina</option>
                        <option>Rio Grande do Sul</option>
                    </optgroup>
                </select>
            </p>
    
            <p>
                <label for="foto">Envie uma foto da sua CNH:</label><br>
                <input type="file" id="foto">
            </p>
        </fieldset>
    </form>
        <h1>Página 2: Escolha do Carro</h1>
        </form>

<form>
    <fieldset>
        <legend>Configuração do Veículo</legend>
        
        <p>
            <label>Escolha o modelo:</label><br>
            <input type="radio" name="modelo" id="seal"> <label for="seal">BYD Seal</label><br>
            <input type="radio" name="modelo" id="han"> <label for="han">BYD Han</label><br>
            <input type="radio" name="modelo" id="song"> <label for="song">BYD Song Plus</label>
        </p>

        <p>
            <label>Itens adicionais:</label><br>
            <input type="checkbox" id="som"> <label for="som">Som Premium</label><br>
            <input type="checkbox" id="ar"> <label for="ar">Ar-condicionado Digital</label><br>
            <input type="checkbox" id="camera"> <label for="camera">Câmera 360°</label>
        </p>

        <p>
            <label for="cor">Cor do carro:</label><br>
            <input type="color" id="cor">
        </p>

        <p>
            <label for="brilho">Intensidade da cor (brilho):</label><br>
            <input type="range" id="brilho" min="0" max="100">
        </p>
    </fieldset>
</form>
<h1>Página 3: Entrega</h1>

<form>
    <fieldset>
        <legend>Informações de Entrega</legend>

        <p>
            <label for="data">Data desejada para entrega:</label><br>
            <input type="date" id="data">
        </p>

        <p>
            <label for="hora">Hora preferida para entrega:</label><br>
            <input type="time" id="hora">
        </p>

        <p>
            <label for="mes">Mês da compra:</label><br>
            <input type="month" id="mes">
        </p>

        <p>
            <label for="expectativa">Conte qual é a sua expectativa sobre o carro:</label><br>
            <textarea id="expectativa" rows="4" cols="40" placeholder="Exemplo: Espero que o carro seja confortável..."></textarea>
        </p>
    </fieldset>
    <h1>Página 4: Avaliação dos Modelos BYD</h1>

    <form>
        <p>
            <label>Avalie o BYD Dolphin Plus (0 a 5 estrelas):</label><br>
            <input type="number" min="0" max="5">
        </p>

        <p>
            <label>Avalie o BYD GS (0 a 5 estrelas):</label><br>
            <input type="number" min="0" max="5">
        </p>

        <p>
            <label>Avalie o BYD Mini (0 a 5 estrelas):</label><br>
            <input type="number" min="0" max="5">
        </p>

        <br>
        <br><br>

        <button type="submit">Enviar Formulário</button>
        <button type="reset">Limpar Tudo</button>
    </form>
    <br>

</form>
    

</body>
</html>
